[build]
  publish = "dist"
  command = "npx expo export --platform web"

# Edge functions intercept share URLs for bot OG meta tags
[[edge_functions]]
  path = "/share/*"
  function = "og-handler"

[[edge_functions]]
  path = "/vs/*"
  function = "og-handler"

[[edge_functions]]
  path = "/daily"
  function = "og-handler"

[[edge_functions]]
  path = "/challenge/*"
  function = "og-handler"
